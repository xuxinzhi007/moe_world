<svg xmlns="http://www.w3.org/2000/svg" width="120" height="80" viewBox="0 0 120 80">
  <defs>
    <linearGradient id="holyBeam" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#ffd700;stop-opacity:0.6"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="80%" style="stop-color:#ffd700;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="impactGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="30%" style="stop-color:#ffff00;stop-opacity:0.9"/>
      <stop offset="60%" style="stop-color:#ffd700;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ff8c00;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="sparkGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Main Beam -->
  <ellipse cx="60" cy="40" rx="55" ry="18" fill="url(#holyBeam)" opacity="0.85"/>
  <!-- Core Beam -->
  <ellipse cx="60" cy="40" rx="40" ry="8" fill="#ffffff" opacity="0.7"/>
  <!-- Impact Point Glow -->
  <ellipse cx="95" cy="40" rx="18" ry="18" fill="url(#impactGlow)" opacity="0.9"/>
  <!-- Impact Center -->
  <ellipse cx="95" cy="40" rx="8" ry="8" fill="#ffffff" opacity="1"/>
  <!-- Cross on Impact -->
  <rect x="92" y="25" width="6" height="20" rx="3" fill="#ffd700" opacity="0.95"/>
  <rect x="88" y="33" width="14" height="6" rx="3" fill="#ffd700" opacity="0.95"/>
  <!-- Sparkles Around Impact -->
  <ellipse cx="80" cy="22" rx="4" ry="4" fill="url(#sparkGrad)"/>
  <ellipse cx="108" cy="28" rx="3" ry="3" fill="url(#sparkGrad)"/>
  <ellipse cx="85" cy="58" rx="3" ry="3" fill="url(#sparkGrad)"/>
  <ellipse cx="105" cy="55" rx="4" ry="4" fill="url(#sparkGrad)"/>
  <!-- Beam Start Glow -->
  <ellipse cx="15" cy="40" rx="12" ry="12" fill="url(#impactGlow)" opacity="0.5"/>
  <!-- Dashed Lines for Energy -->
  <line x1="25" y1="35" x2="75" y2="35" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4,6" opacity="0.6"/>
  <line x1="25" y1="45" x2="75" y2="45" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4,6" opacity="0.6"/>
</svg>