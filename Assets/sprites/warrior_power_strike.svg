<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <defs>
    <radialGradient id="powerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95"/>
      <stop offset="30%" style="stop-color:#ff6b35;stop-opacity:0.8"/>
      <stop offset="60%" style="stop-color:#ff4500;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#8b0000;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="shockWave" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0"/>
      <stop offset="60%" style="stop-color:#ff8c00;stop-opacity:0.4"/>
      <stop offset="85%" style="stop-color:#ff4500;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#ff0000;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="slashGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#ffd700;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#ff8c00;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Shockwave Ring 1 -->
  <ellipse cx="80" cy="80" rx="75" ry="75" fill="url(#shockWave)" opacity="0.7"/>
  <!-- Shockwave Ring 2 -->
  <ellipse cx="80" cy="80" rx="55" ry="55" fill="url(#shockWave)" opacity="0.5"/>
  <!-- Power Core -->
  <ellipse cx="80" cy="80" rx="35" ry="35" fill="url(#powerGlow)" opacity="0.9"/>
  <!-- Main Slash 1 -->
  <path d="M20 80 Q80 30 140 80" fill="none" stroke="url(#slashGrad)" stroke-width="12" stroke-linecap="round"/>
  <!-- Main Slash 2 -->
  <path d="M30 60 Q80 10 130 60" fill="none" stroke="#ffd700" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <!-- Main Slash 3 -->
  <path d="M30 100 Q80 50 130 100" fill="none" stroke="#ffd700" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  <!-- Impact Sparks -->
  <ellipse cx="25" cy="75" rx="8" ry="8" fill="#ff4500" opacity="0.8"/>
  <ellipse cx="135" cy="85" rx="6" ry="6" fill="#ff4500" opacity="0.8"/>
  <ellipse cx="80" cy="20" rx="5" ry="5" fill="#ffd700" opacity="0.9"/>
  <ellipse cx="40" cy="40" rx="4" ry="4" fill="#ff8c00" opacity="0.7"/>
  <ellipse cx="120" cy="35" rx="4" ry="4" fill="#ff8c00" opacity="0.7"/>
</svg>