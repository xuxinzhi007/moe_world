<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
  <defs>
    <radialGradient id="magicBlast" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="20%" style="stop-color:#9370db;stop-opacity:0.95"/>
      <stop offset="50%" style="stop-color:#8a2be2;stop-opacity:0.8"/>
      <stop offset="75%" style="stop-color:#4b0082;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#2e0854;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="magicCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#e6e6fa;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#9370db;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="magicSpark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#da70d6;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Outer Magic Circle -->
  <ellipse cx="90" cy="90" rx="85" ry="85" fill="none" stroke="#9370db" stroke-width="3" stroke-dasharray="10,5" opacity="0.5"/>
  <!-- Inner Magic Circle -->
  <ellipse cx="90" cy="90" rx="65" ry="65" fill="none" stroke="#8a2be2" stroke-width="2" stroke-dasharray="8,4" opacity="0.6"/>
  <!-- Magic Blast Glow -->
  <ellipse cx="90" cy="90" rx="75" ry="75" fill="url(#magicBlast)" opacity="0.6"/>
  <!-- Magic Core -->
  <ellipse cx="90" cy="90" rx="35" ry="35" fill="url(#magicCore)" opacity="0.9"/>
  <!-- Magic Runes/Symbols -->
  <text x="90" y="85" text-anchor="middle" fill="#ffffff" font-size="24" opacity="0.8">✦</text>
  <text x="90" y="115" text-anchor="middle" fill="#e6e6fa" font-size="16" opacity="0.6">⚝</text>
  <!-- Magic Sparks -->
  <ellipse cx="30" cy="50" rx="6" ry="6" fill="url(#magicSpark)"/>
  <ellipse cx="150" cy="55" rx="5" ry="5" fill="url(#magicSpark)"/>
  <ellipse cx="25" cy="120" rx="5" ry="5" fill="url(#magicSpark)"/>
  <ellipse cx="155" cy="125" rx="6" ry="6" fill="url(#magicSpark)"/>
  <ellipse cx="50" cy="20" rx="4" ry="4" fill="url(#magicSpark)"/>
  <ellipse cx="130" cy="25" rx="4" ry="4" fill="url(#magicSpark)"/>
  <ellipse cx="45" cy="160" rx="4" ry="4" fill="url(#magicSpark)"/>
  <ellipse cx="135" cy="155" rx="4" ry="4" fill="url(#magicSpark)"/>
  <!-- Energy Lines -->
  <line x1="90" y1="15" x2="90" y2="45" stroke="#da70d6" stroke-width="2" opacity="0.6"/>
  <line x1="90" y1="135" x2="90" y2="165" stroke="#da70d6" stroke-width="2" opacity="0.6"/>
  <line x1="15" y1="90" x2="45" y2="90" stroke="#da70d6" stroke-width="2" opacity="0.6"/>
  <line x1="135" y1="90" x2="165" y2="90" stroke="#da70d6" stroke-width="2" opacity="0.6"/>
</svg>